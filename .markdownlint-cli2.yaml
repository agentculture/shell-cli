# markdownlint-cli2 config for shell-cli.
# markdownlint-cli2 stops walking at the git root, so a per-user global config
# in the home directory isn't picked up from inside the repo.
# Mirrors the guildmaster / steward / teken preset for workspace consistency.

config:
  default: true
  # MD013: Line length — disabled. Prose lines wrap at the reader.
  MD013: false
  # MD060: Table pipe spacing — disabled (stylistic preference).
  MD060: false
  # MD024: Duplicate headings — allow under different parents so Keep a
  # Changelog entries can each have ### Added / ### Changed / ### Fixed.
  MD024:
    siblings_only: true

ignores:
  - "node_modules/**"
  - ".local/**"
  - ".afi/**"
  - ".teken/**"
  # Generated devague artifacts — spec exports and the plan projection. devague
  # renders claim/task text verbatim, and that text legitimately contains Python
  # identifiers (_CLAIM, _read_file, __init__.py) which markdownlint reads as
  # emphasis (MD037) or strong (MD050). Hand-fixing a generated file is the
  # wrong repair: the fix is upstream escaping, tracked as
  # agentculture/devague#87. Excluded rather than reformatted, same rationale
  # as the vendored skills below.
  - "docs/specs/**"
  - "docs/plans/**"
  # Vendored skills are cited verbatim from guildmaster — do not reformat them.
  - ".claude/skills/**"
