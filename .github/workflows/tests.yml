name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Promote SONAR_TOKEN to job env so the SonarCloud step can gate on
    # `env.SONAR_TOKEN != ''` — `secrets.*` isn't allowed in `if:`. This
    # makes the step a no-op on fork PRs (where the secret isn't injected)
    # and on any repo that hasn't configured the token yet.
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Sonar needs full git history for accurate "new code" blame attribution.
          fetch-depth: 0

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - run: uv sync

      - run: uv run pytest -n auto --cov=shell --cov-report=xml:coverage.xml --cov-report=term -v

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_HOST_URL: https://sonarcloud.io

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - run: uv sync

      - name: black --check
        run: uv run black --check shell tests

      - name: isort --check
        run: uv run isort --check-only shell tests

      - name: flake8
        run: uv run flake8 shell tests

      - name: bandit
        run: uv run bandit -c pyproject.toml -r shell

      - name: markdownlint-cli2
        run: |
          npm install -g markdownlint-cli2@0.21.0
          markdownlint-cli2 "**/*.md" "#node_modules" "#.local" "#.claude/skills" "#.teken"

      - name: afi rubric gate
        run: uv run teken cli doctor . --strict

  inventory-gate:
    # Drift detector for colleague's process-spawn inventory.
    #
    # WHY: shell-cli exists to become the single mediated local-operations
    # plane. Tracking where colleague spawns processes, and noticing when that
    # set moves, is what keeps the Milestone 3 migration honest. This job
    # publishes `debt_remaining` — the count of modules still owning their own
    # spawn — on every run, so the number trends visibly toward zero.
    #
    # This job REPORTS debt; it does not fail on it. Driving 13 -> 0 is
    # Milestone 3 work.
    #
    # WHAT THIS JOB DOES NOT DO: it is not an enforcement boundary and must not
    # be described as one. An adversarial live test (issue #7) landed 30
    # executed evasions at exit 0 — most importantly, ALLOWLIST is keyed per
    # MODULE, so a new spawn added to any of the 15 already-allow-listed
    # modules passes green. Read a green run as "the inventory has not drifted
    # in the ways this scanner can see", never as "no new unmediated spawn path
    # was added".
    #
    # agentculture/colleague is public, so this clones it at the pinned SHA
    # rather than depending on a local checkout. If the clone fails the job
    # fails loudly — a check that silently no-ops is worse than no check.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      # Single source of truth for the pin: the committed scanner.
      - name: Read pinned colleague SHA
        id: pin
        run: |
          set -euo pipefail
          SHA=$(python3 -c "
          import re, pathlib
          src = pathlib.Path('scripts/colleague_inventory.py').read_text()
          m = re.search(r'^PINNED_SHA = \"([0-9a-f]{40})\"$', src, re.M)
          if not m:
              raise SystemExit('PINNED_SHA not found in scripts/colleague_inventory.py')
          print(m.group(1))
          ")
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Pinned colleague SHA: $SHA"

      # A clone failure fails the job here, before the gate can no-op.
      - name: Clone colleague at the pinned SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: agentculture/colleague
          ref: ${{ steps.pin.outputs.sha }}
          path: .colleague-src
          fetch-depth: 1

      - name: Inventory colleague spawn paths
        run: |
          set -euo pipefail
          python3 scripts/colleague_inventory.py .colleague-src --json | tee inventory.json
          # Prove we actually scanned the pinned commit. Without this the gate
          # could pass against some other tree and nobody would notice.
          python3 -c "
          import json, sys
          d = json.load(open('inventory.json'))
          if not d['sha_matches']:
              print('::error::scanned {} but pinned {}'.format(
                  d['observed_sha'], d['pinned_sha']))
              sys.exit(1)
          "

      # Published BEFORE the gate runs, so the counter appears even on a
      # failing run.
      - name: Publish debt_remaining
        run: |
          set -euo pipefail
          DEBT=$(python3 -c "import json; print(json.load(open('inventory.json'))['debt_remaining'])")
          SITES=$(python3 -c "import json; print(json.load(open('inventory.json'))['spawn_sites'])")
          MODS=$(python3 -c "import json; print(json.load(open('inventory.json'))['modules'])")

          echo "::notice title=colleague spawn debt::debt_remaining=$DEBT (target 0 by Milestone 3) — $SITES spawn sites across $MODS modules"

          {
            echo "## colleague process-spawn inventory"
            echo
            echo "| metric | value |"
            echo "| --- | --- |"
            echo "| spawn sites | $SITES |"
            echo "| modules | $MODS |"
            echo "| **debt_remaining** | **$DEBT** (target 0 by Milestone 3) |"
            echo
            echo "Modules still owning their own spawn:"
            echo
            echo '```'
            python3 -c "import json; print('\n'.join(json.load(open('inventory.json'))['debt_modules']))"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Gate — no unclassified spawn paths
        run: python3 scripts/colleague_inventory.py .colleague-src --check

      - name: Drift gate — handler source hashes
        run: |
          set -euo pipefail
          python3 scripts/handler_hashes.py .colleague-src --check

  version-check:
    # Only run on PR events. On push to main after a merged PR, the comparison
    # would always fail (PR_VERSION == MAIN_VERSION because HEAD and origin/main
    # point at the same commit). Restricting the trigger avoids that.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - run: git fetch origin main

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Check version bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # AgentCulture rule: every PR bumps the version — even docs/config/CI.
          # See CLAUDE.md and the version-bump skill for rationale.
          PR_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          MAIN_VERSION=$(git show origin/main:pyproject.toml 2>/dev/null | python3 -c "import sys,tomllib; print(tomllib.loads(sys.stdin.read())['project']['version'])" 2>/dev/null || echo "")

          if [ -z "$MAIN_VERSION" ]; then
            echo "No pyproject.toml on main yet — skipping version check (initial scaffold)."
            exit 0
          fi

          if [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
            MARKER="<!-- version-check -->"
            BODY="⚠️ **Version not bumped** — \`pyproject.toml\` still has \`$PR_VERSION\` (same as main). Bump before merging to avoid a failed PyPI publish.

          $MARKER"

            EXISTING=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              --jq '.[] | select(.body | contains("<!-- version-check -->")) | .id' | head -1)

            if [ -n "$EXISTING" ]; then
              gh api repos/${{ github.repository }}/issues/comments/$EXISTING \
                -X PATCH -f body="$BODY" > /dev/null
            else
              gh pr comment ${{ github.event.pull_request.number }} --body "$BODY" || true
            fi

            echo "::error::Version $PR_VERSION matches main. Bump before merging."
            exit 1
          else
            echo "Version bumped: $MAIN_VERSION -> $PR_VERSION"
          fi
